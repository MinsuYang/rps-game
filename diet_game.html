<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐷 뚠뚠이의 다이어트</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; }
  body {
    background: #87CEEB;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Arial Rounded MT Bold', sans-serif;
    overflow: hidden;
  }
  h1 {
    font-size: clamp(18px, 4vw, 26px);
    color: #ff6b9d;
    text-shadow: 2px 2px 0 #fff;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  #info {
    font-size: clamp(11px, 2.5vw, 13px);
    color: #555;
    margin-bottom: 8px;
  }
  canvas {
    border: 3px solid #ff6b9d;
    border-radius: 16px;
    display: block;
    max-width: 100%;
    box-shadow: 0 4px 20px rgba(255,107,157,0.3);
  }
  #score-board {
    margin-top: 10px;
    font-size: clamp(14px, 3vw, 18px);
    display: flex;
    gap: 30px;
    color: #555;
  }
  #score-board span { color: #ff6b9d; font-weight: bold; }
  #message {
    margin-top: 8px;
    font-size: clamp(12px, 2.5vw, 15px);
    color: #ff6b9d;
    height: 22px;
    font-weight: bold;
  }

  /* 터치 버튼 */
  #touch-controls {
    display: flex;
    gap: 20px;
    margin-top: 14px;
  }
  .touch-btn {
    width: clamp(70px, 18vw, 90px);
    height: clamp(50px, 12vw, 64px);
    background: #ff6b9d;
    border: none;
    border-radius: 16px;
    font-size: clamp(22px, 6vw, 30px);
    color: white;
    cursor: pointer;
    box-shadow: 0 4px 0 #c94d7a;
    active-transform: translateY(2px);
    user-select: none;
    -webkit-user-select: none;
  }
  .touch-btn:active {
    box-shadow: 0 2px 0 #c94d7a;
    transform: translateY(2px);
  }
  #start-btn {
    width: clamp(120px, 30vw, 160px);
    height: clamp(50px, 12vw, 64px);
    background: #ffd700;
    border: none;
    border-radius: 16px;
    font-size: clamp(14px, 3.5vw, 18px);
    font-weight: bold;
    color: #555;
    cursor: pointer;
    box-shadow: 0 4px 0 #c9a800;
    user-select: none;
  }
  #start-btn:active {
    box-shadow: 0 2px 0 #c9a800;
    transform: translateY(2px);
  }
</style>
</head>
<body>

<h1>🐷 뚠뚠이의 다이어트</h1>
<div id="info">음식을 피해서 다이어트 성공!</div>
<canvas id="game"></canvas>
<div id="score-board">점수: <span id="score">0</span> &nbsp; 최고기록: <span id="best">0</span></div>
<div id="message">버튼을 눌러 시작!</div>

<div id="touch-controls">
  <button class="touch-btn" id="btn-left">◀</button>
  <button id="start-btn">🐷 시작!</button>
  <button class="touch-btn" id="btn-right">▶</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// 반응형 캔버스 크기
const maxW = Math.min(window.innerWidth - 20, 400);
const maxH = Math.min(window.innerHeight * 0.55, 560);
canvas.width = maxW;
canvas.height = maxH;
const W = canvas.width, H = canvas.height;

const LANE_COUNT = 5;
const LANE_W = W / LANE_COUNT;
const PLAYER_W = 44, PLAYER_H = 44;
const OBS_W = 38, OBS_H = 38;

let state = 'idle';
let score = 0, best = 0, frame = 0;
let playerLane = 2;
let obstacles = [], particles = [];
let speed = 3.5, spawnInterval = 90, lastSpawn = 0;
let playerX = 0, targetX = 0;

// 배경 구름
let clouds = [
  {x: 60, y: 30, s: 1}, {x: 200, y: 60, s: 0.8},
  {x: 320, y: 20, s: 1.1}, {x: 100, y: 100, s: 0.7}
];

// 땅 풀 애니메이션
let grassOffset = 0;

const FOODS = ['🍔','🍕','🌮','🍩','🍟','🍦','🧁','🍫','🥐','🍰'];

function laneX(lane) { return lane * LANE_W + LANE_W / 2; }

function reset() {
  score = 0; frame = 0; speed = 3.5; spawnInterval = 90; lastSpawn = 0;
  playerLane = 2; playerX = laneX(2); targetX = playerX;
  obstacles = []; particles = [];
}

function spawnObstacle() {
  // 한 줄에 최대 3개만
  const lane = Math.floor(Math.random() * LANE_COUNT);
  const food = FOODS[Math.floor(Math.random() * FOODS.length)];
  obstacles.push({ lane, x: laneX(lane), y: -OBS_H, food, size: 30 + Math.random() * 10 });
}

function spawnParticles(x, y) {
  const emojis = ['💨','⭐','✨','💫'];
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.8) * 6,
      life: 1,
      emoji: emojis[Math.floor(Math.random() * emojis.length)]
    });
  }
}

function drawBackground() {
  // 하늘
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.7);
  grad.addColorStop(0, '#87CEEB');
  grad.addColorStop(1, '#b0e0ff');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 구름
  clouds.forEach(c => {
    ctx.font = `${28 * c.s}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('☁️', c.x, c.y);
    c.x -= 0.3 * c.s;
    if (c.x < -40) c.x = W + 40;
  });

  // 땅
  const groundY = H * 0.82;
  ctx.fillStyle = '#90EE90';
  ctx.fillRect(0, groundY, W, H - groundY);
  ctx.fillStyle = '#7BC87B';
  ctx.fillRect(0, groundY, W, 8);

  // 레인 구분 (잔디 줄)
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.setLineDash([16, 16]);
  for (let i = 1; i < LANE_COUNT; i++) {
    ctx.beginPath();
    ctx.moveTo(i * LANE_W, 0);
    ctx.lineTo(i * LANE_W, groundY);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawPlayer() {
  const px = playerX;
  const py = H * 0.82 - PLAYER_H / 2 - 4;

  // 그림자
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.ellipse(px, py + PLAYER_H / 2 + 2, PLAYER_W / 2, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // 뚠뚠이 몸통 (분홍 동그라미)
  ctx.fillStyle = '#FFB6C1';
  ctx.beginPath();
  ctx.ellipse(px, py, PLAYER_W / 2 + 4, PLAYER_H / 2 + 2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#ff8fab';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 이모지 돼지
  ctx.font = '34px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🐷', px, py);

  // 달리기 효과 (발)
  const run = Math.sin(frame * 0.3) * 4;
  ctx.font = '14px sans-serif';
  ctx.fillText('🦵', px - 8, py + PLAYER_H / 2 - 2 + run);
  ctx.fillText('🦵', px + 8, py + PLAYER_H / 2 - 2 - run);
}

function drawObstacles() {
  obstacles.forEach(obs => {
    // 살짝 흔들리는 효과
    const wobble = Math.sin(frame * 0.2 + obs.x) * 2;
    ctx.font = `${obs.size}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(obs.food, obs.x + wobble, obs.y);
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.emoji, p.x, p.y);
  });
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // 점수 배경
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.roundRect(8, 8, 110, 32, 10);
  ctx.fill();
  ctx.fillStyle = '#ff6b9d';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('🏃 점수: ' + score, 16, 24);

  // 레벨
  const lvl = Math.floor((speed - 3.5) / 0.5) + 1;
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.roundRect(W - 100, 8, 92, 32, 10);
  ctx.fill();
  ctx.fillStyle = '#ff6b9d';
  ctx.textAlign = 'right';
  ctx.fillText('레벨 ' + lvl + ' 🔥', W - 12, 24);
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.roundRect(W/2 - 140, H/2 - 90, 280, 180, 20);
  ctx.fill();
  ctx.strokeStyle = '#ff6b9d';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.font = 'bold 30px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ff6b9d';
  ctx.fillText('🐷 다이어트 실패!', W/2, H/2 - 50);

  ctx.fillStyle = '#555';
  ctx.font = '18px sans-serif';
  ctx.fillText('점수: ' + score + '점', W/2, H/2 - 10);

  ctx.fillStyle = '#ffa500';
  ctx.font = '15px sans-serif';
  ctx.fillText('최고기록: ' + best + '점', W/2, H/2 + 20);

  ctx.fillStyle = '#aaa';
  ctx.font = '13px sans-serif';
  ctx.fillText('다시 도전해봐요! 💪', W/2, H/2 + 55);
}

function drawIdle() {
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.beginPath();
  ctx.roundRect(W/2 - 140, H/2 - 70, 280, 140, 20);
  ctx.fill();
  ctx.strokeStyle = '#ff6b9d';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ff6b9d';
  ctx.fillText('🐷 뚠뚠이의 다이어트', W/2, H/2 - 30);

  ctx.fillStyle = '#555';
  ctx.font = '13px sans-serif';
  ctx.fillText('음식을 피해서 살을 빼자!', W/2, H/2 + 5);
  ctx.fillText('버튼 또는 방향키로 이동', W/2, H/2 + 30);
}

function checkCollision() {
  const px = playerX;
  const py = H * 0.82 - PLAYER_H / 2 - 4;
  for (let obs of obstacles) {
    const dx = Math.abs(obs.x - px);
    const dy = Math.abs(obs.y - py);
    if (dx < PLAYER_W / 2 + 14 && dy < PLAYER_H / 2 + 14) return obs;
  }
  return null;
}

function update() {
  if (state !== 'playing') return;
  frame++;
  score = Math.floor(frame / 6);
  document.getElementById('score').textContent = score;

  speed = 3.5 + Math.floor(frame / 360) * 0.5;
  spawnInterval = Math.max(30, 90 - Math.floor(frame / 240) * 6);

  playerX += (targetX - playerX) * 0.2;

  if (frame - lastSpawn > spawnInterval) {
    spawnObstacle();
    lastSpawn = frame;
  }

  obstacles.forEach(obs => { obs.y += speed; });
  obstacles = obstacles.filter(obs => obs.y < H + OBS_H);

  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.life -= 0.05;
  });
  particles = particles.filter(p => p.life > 0);

  const hit = checkCollision();
  if (hit) {
    spawnParticles(playerX, H * 0.82 - PLAYER_H);
    if (score > best) {
      best = score;
      document.getElementById('best').textContent = best;
    }
    state = 'dead';
    document.getElementById('message').textContent = '🍔 음식에 굴복했어요... 다시 도전!';
    document.getElementById('start-btn').textContent = '🐷 다시!';
  }
}

function draw() {
  drawBackground();
  drawObstacles();
  drawParticles();
  if (state !== 'idle') drawPlayer();
  drawHUD();
  if (state === 'dead') drawGameOver();
  if (state === 'idle') drawIdle();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

// 시작 버튼
document.getElementById('start-btn').addEventListener('click', () => {
  if (state === 'idle' || state === 'dead') {
    reset();
    state = 'playing';
    document.getElementById('message').textContent = '음식을 피하세요! 🥗';
    document.getElementById('start-btn').textContent = '🥗 파이팅!';
  }
});

// 터치 버튼
function moveLeft() {
  if (state !== 'playing') return;
  if (playerLane > 0) { playerLane--; targetX = laneX(playerLane); }
}
function moveRight() {
  if (state !== 'playing') return;
  if (playerLane < LANE_COUNT - 1) { playerLane++; targetX = laneX(playerLane); }
}

document.getElementById('btn-left').addEventListener('touchstart', e => { e.preventDefault(); moveLeft(); });
document.getElementById('btn-right').addEventListener('touchstart', e => { e.preventDefault(); moveRight(); });
document.getElementById('btn-left').addEventListener('click', moveLeft);
document.getElementById('btn-right').addEventListener('click', moveRight);

// 키보드
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    if (state === 'idle' || state === 'dead') {
      reset(); state = 'playing';
      document.getElementById('message').textContent = '음식을 피하세요! 🥗';
      document.getElementById('start-btn').textContent = '🥗 파이팅!';
    }
    e.preventDefault();
  }
  if (e.code === 'ArrowLeft') { moveLeft(); e.preventDefault(); }
  if (e.code === 'ArrowRight') { moveRight(); e.preventDefault(); }
});

loop();
</script>
</body>
</html>
